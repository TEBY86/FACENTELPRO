version: '3.8'

services:
  entel-bot:
    build: .
    container_name: entel-factibilidad-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      # Persistir logs si es necesario
      - ./logs:/app/logs
      # Persistir imágenes generadas
      - ./imagenes:/app/imagenes
    # Si usas webhook, descomenta esto:
    # ports:
    #   - "8080:8080"